<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
@keyframes stFloatA { 0%{transform:translate(0,0) scale(1)} 50%{transform:translate(17%,-15%) scale(1.32)} 100%{transform:translate(0,0) scale(1)} }
@keyframes stFloatB { 0%{transform:translate(0,0) scale(1.14)} 50%{transform:translate(-19%,13%) scale(0.82)} 100%{transform:translate(0,0) scale(1.14)} }
@keyframes stFloatC { 0%{transform:translate(0,0) scale(0.93)} 50%{transform:translate(14%,19%) scale(1.34)} 100%{transform:translate(0,0) scale(0.93)} }
@keyframes stEq { 0%,100%{transform:scaleY(0.25)} 50%{transform:scaleY(1)} }
@keyframes stPulse { 0%,100%{opacity:0.55} 50%{opacity:1} }
@keyframes stHint { 0%{opacity:0} 12%{opacity:0.45} 72%{opacity:0.45} 100%{opacity:0} }
@keyframes stRise { 0%{transform:translateY(16px)} 100%{transform:translateY(0)} }
@keyframes stDrift1 { 0%{transform:translate(0,0);opacity:0.15} 50%{transform:translate(6%,-9%);opacity:1} 100%{transform:translate(0,0);opacity:0.15} }
@keyframes stDrift2 { 0%{transform:translate(0,0);opacity:1} 50%{transform:translate(-7%,-6%);opacity:0.2} 100%{transform:translate(0,0);opacity:1} }
@keyframes stDrift3 { 0%{transform:translate(0,0);opacity:0.3} 45%{transform:translate(5%,8%);opacity:0.9} 100%{transform:translate(0,0);opacity:0.3} }
@keyframes stBeamA { 0%{transform:rotate(-4deg) scaleY(1) translateY(0);opacity:.82} 50%{transform:rotate(5deg) scaleY(1.06) translateY(-2%);opacity:1} 100%{transform:rotate(-4deg) scaleY(1) translateY(0);opacity:.82} }
@keyframes stBeamB { 0%{transform:rotate(5deg) scaleY(1.05) translateY(0);opacity:1} 50%{transform:rotate(-6deg) scaleY(.97) translateY(-1%);opacity:.78} 100%{transform:rotate(5deg) scaleY(1.05) translateY(0);opacity:1} }
@keyframes stBeamC { 0%{transform:rotate(-2deg) scaleY(.98) translateY(0);opacity:.88} 50%{transform:rotate(7deg) scaleY(1.08) translateY(-3%);opacity:1} 100%{transform:rotate(-2deg) scaleY(.98) translateY(0);opacity:.88} }
@keyframes stSweepA { 0%{transform:translate(-14%,10%) scale(1);opacity:.55} 50%{transform:translate(16%,-11%) scale(1.04);opacity:1} 100%{transform:translate(-14%,10%) scale(1);opacity:.55} }
@keyframes stSweepB { 0%{transform:translate(13%,-9%) scale(1.03);opacity:.6} 50%{transform:translate(-15%,11%) scale(.98);opacity:1} 100%{transform:translate(13%,-9%) scale(1.03);opacity:.6} }
@keyframes stSweepC { 0%{transform:translate(-11%,-12%) scale(.99);opacity:.65} 50%{transform:translate(14%,12%) scale(1.05);opacity:1} 100%{transform:translate(-11%,-12%) scale(.99);opacity:.65} }
</style>
</helmet>
<div style="position:relative;width:100%;height:100%;overflow:hidden;background:{{ bg }};container-type:size;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif;">

  <sc-if value="{{ shaderOn }}" hint-placeholder-val="{{ false }}">
    <canvas ref="{{ setCanvas }}" style="position:absolute;inset:0;width:100%;height:100%;display:block;"></canvas>
  </sc-if>

  <sc-for list="{{ blobs }}" as="b" hint-placeholder-count="4">
    <div style="{{ b.style }}"><div style="{{ b.inner }}"></div></div>
  </sc-for>

  <sc-if value="{{ blobOverlay }}" hint-placeholder-val="{{ true }}">
  <div style="position:absolute;inset:0;background:linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0) 26%, rgba(255,255,255,0) 72%, rgba(255,255,255,0.35));pointer-events:none;"></div>
  </sc-if>

  <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5cqh;padding:9cqmin;box-sizing:border-box;text-align:center;">

    <sc-if value="{{ hasLogo }}" hint-placeholder-val="{{ true }}">
      <img src="{{ logo }}" alt="logo" style="height:17cqmin;max-width:58cqw;object-fit:contain;animation:stRise 1.1s cubic-bezier(.2,.7,.2,1) both;" />
    </sc-if>

    <sc-if value="{{ showCountdown }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;flex-direction:column;align-items:center;gap:2.4cqh;animation:stRise 1.2s cubic-bezier(.2,.7,.2,1) both;">
        <div style="font-size:2.1cqmin;text-transform:uppercase;letter-spacing:0.42em;font-weight:600;color:{{ ink }};opacity:0.42;padding-left:0.42em;">{{ label }}</div>
        <div style="font-size:15cqmin;font-weight:200;font-variant-numeric:tabular-nums;line-height:0.95;color:{{ ink }};letter-spacing:0.01em;">{{ countdownText }}</div>
        <div style="font-size:2.7cqmin;font-weight:400;color:{{ ink }};opacity:0.6;max-width:70cqw;">{{ title }}</div>
      </div>
    </sc-if>

    <sc-if value="{{ showAmbient }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;flex-direction:column;align-items:center;gap:2cqh;">
        <div style="font-size:6.4cqmin;font-weight:300;color:{{ ink }};animation:stPulse 3.4s ease-in-out infinite;letter-spacing:0.005em;">{{ subtitle }}</div>
        <div style="font-size:2.6cqmin;font-weight:400;color:{{ ink }};opacity:0.5;">{{ title }}</div>
      </div>
    </sc-if>

  </div>

  <sc-if value="{{ showNowPlaying }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;left:50%;bottom:6cqh;transform:translateX(-50%);display:flex;align-items:center;gap:2.2cqmin;padding:1.5cqmin 3cqmin 1.5cqmin 1.5cqmin;background:rgba(255,255,255,0.62);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(0,0,0,0.05);border-radius:999px;box-shadow:0 2cqmin 6cqmin rgba(0,0,0,0.08);animation:stRise 1s cubic-bezier(.2,.7,.2,1) both;">
      <div style="width:6.2cqmin;height:6.2cqmin;border-radius:1.6cqmin;background:{{ track.cover }};flex:none;box-shadow:0 1cqmin 2cqmin rgba(0,0,0,0.12);"></div>
      <div style="display:flex;flex-direction:column;gap:0.5cqh;min-width:0;text-align:left;">
        <div style="font-size:2.3cqmin;font-weight:600;color:{{ ink }};white-space:nowrap;">{{ track.title }}</div>
        <div style="font-size:2cqmin;color:{{ ink }};opacity:0.5;white-space:nowrap;">{{ track.artist }}</div>
      </div>
      <div style="display:flex;align-items:flex-end;gap:0.6cqmin;height:4cqmin;margin-left:1.2cqmin;">
        <div style="width:0.8cqmin;height:100%;background:{{ accent }};border-radius:1cqmin;transform-origin:bottom;animation:stEq 0.9s ease-in-out infinite;animation-play-state:{{ eqPlay }};"></div>
        <div style="width:0.8cqmin;height:100%;background:{{ accent }};border-radius:1cqmin;transform-origin:bottom;animation:stEq 0.9s ease-in-out 0.25s infinite;animation-play-state:{{ eqPlay }};"></div>
        <div style="width:0.8cqmin;height:100%;background:{{ accent }};border-radius:1cqmin;transform-origin:bottom;animation:stEq 0.9s ease-in-out 0.5s infinite;animation-play-state:{{ eqPlay }};"></div>
        <div style="width:0.8cqmin;height:100%;background:{{ accent }};border-radius:1cqmin;transform-origin:bottom;animation:stEq 0.9s ease-in-out 0.15s infinite;animation-play-state:{{ eqPlay }};"></div>
      </div>
    </div>
  </sc-if>

  <sc-if value="{{ showExitHint }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;top:5cqh;left:50%;transform:translateX(-50%);font-size:1.9cqmin;letter-spacing:0.16em;text-transform:uppercase;font-weight:500;color:{{ ink }};opacity:0;animation:stHint 6.5s ease-in-out 1.2s both;">Press Esc to exit</div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:960,&quot;height&quot;:540},&quot;bg&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#fbfbfd&quot;},&quot;accent&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;rgb(10,132,255)&quot;},&quot;ink&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#1d1d1f&quot;},&quot;blobs&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[]},&quot;logo&quot;:{&quot;editor&quot;:null,&quot;default&quot;:null},&quot;hasLogo&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Team All-Hands&quot;},&quot;subtitle&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;We\u2019ll begin shortly&quot;},&quot;countdownText&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;05:00&quot;},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Begins in&quot;},&quot;showCountdown&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true},&quot;showAmbient&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false},&quot;track&quot;:{&quot;editor&quot;:null,&quot;default&quot;:{&quot;cover&quot;:&quot;linear-gradient(135deg,#a8edea,#fed6e3)&quot;,&quot;title&quot;:&quot;Weightless&quot;,&quot;artist&quot;:&quot;Marconi Union&quot;}},&quot;showNowPlaying&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true},&quot;eqPlay&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;running&quot;},&quot;showExitHint&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false},&quot;shader&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;},&quot;shaderCols&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props || {};
    const on = !!p.shader;
    return { setCanvas: this.setCanvas, shaderOn: on, blobOverlay: !on };
  }

  setCanvas = (el) => {
    if (el === this._canvas) return;
    if (this._canvas) this.teardownGL();
    this._canvas = el || null;
    if (el) this.initGL();
  };

  componentDidUpdate() {
    const sh = this.props && this.props.shader;
    if (!sh) return;
    if (this._canvas && sh !== this._shaderId) { this.teardownGL(); this.initGL(); return; }
    if (this._gl) this.setTarget(this.props.shaderCols);
  }
  componentWillUnmount() { this.teardownGL(); }

  parseCols(str) {
    const groups = String(str || '').split('|');
    const lin = (n) => Math.pow(Math.max(0, Math.min(255, +n || 0)) / 255, 2.2);
    const out = [];
    for (let i = 0; i < 4; i++) {
      const g = (groups[i] || '0,0,0').split(',');
      out.push([lin(g[0]), lin(g[1]), lin(g[2])]);
    }
    return out;
  }
  setTarget(str) { this._tgt = this.parseCols(str); }

  initGL() {
    const canvas = this._canvas;
    if (!canvas) return;
    this._cur = this.parseCols(this.props && this.props.shaderCols);
    this._tgt = this._cur.map((c) => c.slice());
    let gl = null;
    try {
      const o = { antialias: false, alpha: false, depth: false, stencil: false, premultipliedAlpha: false, powerPreference: 'high-performance' };
      gl = canvas.getContext('webgl2', o) || canvas.getContext('webgl', o);
    } catch (e) { gl = null; }
    if (!gl) { this.fallback(); return; }
    this._gl = gl;

    const VERT = 'attribute vec2 aPos;varying vec2 vUv;void main(){vUv=aPos*0.5+0.5;gl_Position=vec4(aPos,0.0,1.0);}';
    this._shaderId = this.props && this.props.shader;
    const PRELUDE = [
      'precision highp float;varying vec2 vUv;',
      'uniform float uTime;uniform float uAspect;uniform int uOctaves;',
      'uniform vec3 uBase;uniform vec3 uA;uniform vec3 uB;uniform vec3 uC;',
      'vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}',
      'vec2 mod289(vec2 x){return x-floor(x*(1.0/289.0))*289.0;}',
      'vec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}',
      'float snoise(vec2 v){const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);',
      'vec2 i=floor(v+dot(v,C.yy));vec2 x0=v-i+dot(i,C.xx);',
      'vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);',
      'vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod289(i);',
      'vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));',
      'vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);m=m*m;m=m*m;',
      'vec3 x=2.0*fract(p*C.www)-1.0;vec3 h=abs(x)-0.5;vec3 ox=floor(x+0.5);vec3 a0=x-ox;',
      'm*=1.79284291400159-0.85373472095314*(a0*a0+h*h);',
      'vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;return 130.0*dot(m,g);}',
      'float fbm(vec2 p){float v=0.0;float a=0.5;for(int i=0;i<3;i++){if(i>=uOctaves)break;v+=a*snoise(p);p*=2.02;a*=0.5;}return v;}',
      'vec3 RRTAndODTFit(vec3 v){vec3 a=v*(v+0.0245786)-0.000090537;vec3 b=v*(0.983729*v+0.4329510)+0.238081;return a/b;}',
      'vec3 aces(vec3 color){const mat3 mi=mat3(0.59719,0.07600,0.02840,0.35458,0.90834,0.13383,0.04823,0.01566,0.83777);',
      'const mat3 mo=mat3(1.60475,-0.10208,-0.00327,-0.53108,1.10813,-0.07276,-0.07367,-0.00605,1.07602);',
      'color*=1.0/0.6;color=mi*color;color=RRTAndODTFit(color);color=mo*color;return clamp(color,0.0,1.0);}',
      'vec3 senc(vec3 c){return mix(pow(c,vec3(0.41666))*1.055-0.055,c*12.92,vec3(lessThanEqual(c,vec3(0.0031308))));}'
    ].join('');
    const AURORA_MAIN = [
      'void main(){vec2 uv=vUv;vec2 p=uv*2.0-1.0;p.x*=max(uAspect,1.0);p.y*=max(1.0/uAspect,1.0);',
      'vec2 q=vec2(fbm(p*0.6+vec2(uTime*0.018,-uTime*0.012)),fbm(p*0.6+vec2(-uTime*0.016,uTime*0.014)));',
      'float n1=fbm(p*0.9+q*1.2+vec2(uTime*0.02,0.0));float n2=fbm(p*1.1-q*0.8+vec2(-uTime*0.018,uTime*0.013));',
      'float gMask=smoothstep(0.0,0.7,n1)*smoothstep(0.95,0.10,uv.x);',
      'float grMask=smoothstep(0.0,0.7,n2)*smoothstep(0.05,0.90,uv.x);',
      'float vMask=smoothstep(0.0,0.55,n1*n2)*(1.0-abs(uv.x-0.5)*1.6);',
      'vec3 col=uBase;col+=uA*gMask*0.42;col+=uB*grMask*0.36;col+=uC*max(vMask,0.0)*0.30;',
      'float vig=smoothstep(1.5,0.35,length(p));col*=0.30+0.70*vig;',
      'col=senc(aces(col));gl_FragColor=vec4(col,1.0);}'
    ].join('');
    const SILK_MAIN = [
      'void main(){vec2 uv=vUv;vec2 p=uv*2.0-1.0;p.x*=max(uAspect,1.0);',
      'float t=uTime;',
      'float flow=uv.y*1.6+0.12*sin(t*0.6+uv.x*3.0);',
      'vec2 wp=vec2(uv.x*2.2,flow);',
      'float w1=fbm(wp+vec2(0.0,t*0.03));',
      'float w2=fbm(wp*1.7+vec2(5.2,-t*0.025));',
      'float warp=uv.x*7.2+1.3*w1+0.6*sin(flow*2.0+t*0.4);',
      'float fold=0.5+0.5*sin(warp);',
      'float band=smoothstep(0.15,0.85,fold);',
      'float grd=abs(cos(warp));',
      'float sheen=pow(1.0-grd,6.0);',
      'float travel=0.5+0.5*sin(flow*1.5-t*0.7);',
      'sheen*=0.35+0.65*travel;',
      'float mixA=0.5+0.5*sin(warp*0.5+w2*1.5);',
      'float mixB=0.5+0.5*cos(warp*0.33-uv.y*1.2+t*0.15);',
      'vec3 cloth=mix(uA,uB,mixA);cloth=mix(cloth,uC,mixB*0.5);',
      'vec3 col=uBase;',
      'col+=cloth*band*0.40;',
      'col+=cloth*(0.18+0.10*w1);',
      'col+=(uC*0.5+vec3(0.5))*sheen*0.55;',
      'col*=0.78+0.22*smoothstep(1.1,0.1,uv.y);',
      'float vig=smoothstep(1.7,0.4,length(p));col*=0.32+0.68*vig;',
      'col=senc(aces(col));gl_FragColor=vec4(col,1.0);}'
    ].join('');
    const FRAG = PRELUDE + (this._shaderId === 'silk' ? SILK_MAIN : AURORA_MAIN);

    const mk = (t, s) => { const sh = gl.createShader(t); gl.shaderSource(sh, s); gl.compileShader(sh); return sh; };
    const prog = gl.createProgram();
    gl.attachShader(prog, mk(gl.VERTEX_SHADER, VERT));
    gl.attachShader(prog, mk(gl.FRAGMENT_SHADER, FRAG));
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) { this._gl = null; this.fallback(); return; }
    gl.useProgram(prog);
    this._prog = prog;

    const quad = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, quad);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
    const aPos = gl.getAttribLocation(prog, 'aPos');
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
    this._u = {
      time: gl.getUniformLocation(prog, 'uTime'),
      aspect: gl.getUniformLocation(prog, 'uAspect'),
      oct: gl.getUniformLocation(prog, 'uOctaves'),
      base: gl.getUniformLocation(prog, 'uBase'),
      a: gl.getUniformLocation(prog, 'uA'),
      b: gl.getUniformLocation(prog, 'uB'),
      c: gl.getUniformLocation(prog, 'uC')
    };
    gl.disable(gl.DEPTH_TEST); gl.disable(gl.BLEND);

    const dm = navigator.deviceMemory;
    const hi = !(typeof dm === 'number' && dm <= 4);
    this._pr = Math.min(window.devicePixelRatio || 1, hi ? 1.75 : 1.0);
    gl.uniform1i(this._u.oct, hi ? 3 : 2);

    this._t = 0; this._last = 0;
    this._resize = () => {
      const par = canvas.parentNode;
      const w = canvas.clientWidth || (par && par.clientWidth) || window.innerWidth;
      const hh = canvas.clientHeight || (par && par.clientHeight) || window.innerHeight;
      const bw = Math.max(1, Math.round(w * this._pr)), bh = Math.max(1, Math.round(hh * this._pr));
      if (canvas.width !== bw || canvas.height !== bh) { canvas.width = bw; canvas.height = bh; }
      gl.viewport(0, 0, bw, bh);
      gl.uniform1f(this._u.aspect, w / Math.max(1, hh));
    };
    this._resize();
    try { this._ro = new ResizeObserver(this._resize); this._ro.observe(canvas.parentNode || canvas); } catch (e) {}
    window.addEventListener('resize', this._resize);
    this._onVis = () => { if (!document.hidden && this._gl && this._raf == null) { this._last = 0; this._raf = requestAnimationFrame(this._loop); } };
    document.addEventListener('visibilitychange', this._onVis);

    this._loop = (now) => {
      if (document.hidden || !this._gl) { this._raf = null; return; }
      const dt = this._last ? Math.min((now - this._last) / 1000, 0.05) : 0;
      this._last = now;
      this._t += dt;
      const k = Math.min(dt * 2.2, 1);
      for (let i = 0; i < 4; i++) for (let j = 0; j < 3; j++) this._cur[i][j] += (this._tgt[i][j] - this._cur[i][j]) * k;
      gl.uniform1f(this._u.time, this._t);
      gl.uniform3f(this._u.base, this._cur[0][0], this._cur[0][1], this._cur[0][2]);
      gl.uniform3f(this._u.a, this._cur[1][0], this._cur[1][1], this._cur[1][2]);
      gl.uniform3f(this._u.b, this._cur[2][0], this._cur[2][1], this._cur[2][2]);
      gl.uniform3f(this._u.c, this._cur[3][0], this._cur[3][1], this._cur[3][2]);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      this._raf = requestAnimationFrame(this._loop);
    };
    this._raf = requestAnimationFrame(this._loop);
  }

  fallback() {
    const c = this._canvas; if (!c) return;
    const t = this.parseCols(this.props && this.props.shaderCols);
    const u = (a, al) => { const s = (x) => Math.round(Math.pow(Math.max(0, x), 1 / 2.2) * 255); return 'rgba(' + s(a[0]) + ',' + s(a[1]) + ',' + s(a[2]) + ',' + al + ')'; };
    c.style.background = 'radial-gradient(900px 600px at 70% 40%,' + u(t[1], 0.34) + ',transparent 60%),radial-gradient(700px 500px at 20% 70%,' + u(t[2], 0.22) + ',transparent 62%),radial-gradient(800px 600px at 45% 82%,' + u(t[3], 0.18) + ',transparent 60%),' + u(t[0], 1);
  }

  teardownGL() {
    if (this._raf != null) { cancelAnimationFrame(this._raf); this._raf = null; }
    if (this._ro) { try { this._ro.disconnect(); } catch (e) {} this._ro = null; }
    if (this._resize) window.removeEventListener('resize', this._resize);
    if (this._onVis) document.removeEventListener('visibilitychange', this._onVis);
    const gl = this._gl;
    if (gl) { try { const ext = gl.getExtension('WEBGL_lose_context'); if (ext) ext.loseContext(); } catch (e) {} }
    this._gl = null; this._prog = null; this._u = null; this._shaderId = null;
    if (this._canvas) this._canvas.style.background = '';
  }
}
</script>

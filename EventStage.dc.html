<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
@keyframes stFloatA { 0%{transform:translate(0,0) scale(1)} 50%{transform:translate(17%,-15%) scale(1.32)} 100%{transform:translate(0,0) scale(1)} }
@keyframes stFloatB { 0%{transform:translate(0,0) scale(1.14)} 50%{transform:translate(-19%,13%) scale(0.82)} 100%{transform:translate(0,0) scale(1.14)} }
@keyframes stFloatC { 0%{transform:translate(0,0) scale(0.93)} 50%{transform:translate(14%,19%) scale(1.34)} 100%{transform:translate(0,0) scale(0.93)} }
@keyframes stEq { 0%,100%{transform:scaleY(0.25)} 50%{transform:scaleY(1)} }
@keyframes stPulse { 0%,100%{opacity:0.55} 50%{opacity:1} }
@keyframes stHint { 0%{opacity:0} 12%{opacity:0.45} 72%{opacity:0.45} 100%{opacity:0} }
@keyframes stRise { 0%{transform:translateY(16px)} 100%{transform:translateY(0)} }
@keyframes stDrift1 { 0%{transform:translate(0,0);opacity:0.15} 50%{transform:translate(6%,-9%);opacity:1} 100%{transform:translate(0,0);opacity:0.15} }
@keyframes stDrift2 { 0%{transform:translate(0,0);opacity:1} 50%{transform:translate(-7%,-6%);opacity:0.2} 100%{transform:translate(0,0);opacity:1} }
@keyframes stDrift3 { 0%{transform:translate(0,0);opacity:0.3} 45%{transform:translate(5%,8%);opacity:0.9} 100%{transform:translate(0,0);opacity:0.3} }
@keyframes stBeamA { 0%{transform:rotate(-4deg) scaleY(1) translateY(0);opacity:.82} 50%{transform:rotate(5deg) scaleY(1.06) translateY(-2%);opacity:1} 100%{transform:rotate(-4deg) scaleY(1) translateY(0);opacity:.82} }
@keyframes stBeamB { 0%{transform:rotate(5deg) scaleY(1.05) translateY(0);opacity:1} 50%{transform:rotate(-6deg) scaleY(.97) translateY(-1%);opacity:.78} 100%{transform:rotate(5deg) scaleY(1.05) translateY(0);opacity:1} }
@keyframes stBeamC { 0%{transform:rotate(-2deg) scaleY(.98) translateY(0);opacity:.88} 50%{transform:rotate(7deg) scaleY(1.08) translateY(-3%);opacity:1} 100%{transform:rotate(-2deg) scaleY(.98) translateY(0);opacity:.88} }
@keyframes stSweepA { 0%{transform:translate(-14%,10%) scale(1);opacity:.55} 50%{transform:translate(16%,-11%) scale(1.04);opacity:1} 100%{transform:translate(-14%,10%) scale(1);opacity:.55} }
@keyframes stSweepB { 0%{transform:translate(13%,-9%) scale(1.03);opacity:.6} 50%{transform:translate(-15%,11%) scale(.98);opacity:1} 100%{transform:translate(13%,-9%) scale(1.03);opacity:.6} }
@keyframes stSweepC { 0%{transform:translate(-11%,-12%) scale(.99);opacity:.65} 50%{transform:translate(14%,12%) scale(1.05);opacity:1} 100%{transform:translate(-11%,-12%) scale(.99);opacity:.65} }
</style>
</helmet>
<div style="position:relative;width:100%;height:100%;overflow:hidden;background:{{ bg }};container-type:size;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif;">

  <canvas ref="{{ setCanvas }}" style="position:absolute;inset:0;width:100%;height:100%;display:{{ shaderDisplay }};"></canvas>

  <sc-if value="{{ iridOn }}" hint-placeholder-val="{{ false }}">
    <iframe ref="{{ setIridFrame }}" src="./IridescentLogoAnimator/?embed=1" style="position:absolute;inset:0;width:100%;height:100%;border:none;display:block;" scrolling="no" allowtransparency="false"></iframe>
  </sc-if>

  <sc-for list="{{ blobs }}" as="b" hint-placeholder-count="4">
    <div style="{{ b.style }}"><div style="{{ b.inner }}"></div></div>
  </sc-for>

  <sc-if value="{{ blobOverlay }}" hint-placeholder-val="{{ true }}">
  <div style="position:absolute;inset:0;background:linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0) 26%, rgba(255,255,255,0) 72%, rgba(255,255,255,0.35));pointer-events:none;"></div>
  </sc-if>

  <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5cqh;padding:9cqmin;box-sizing:border-box;text-align:center;">

    <sc-if value="{{ showCountdown }}" hint-placeholder-val="{{ true }}">
      <div style="{{ glassCountdownStyle }}">
        <sc-if value="{{ showLogoImg }}" hint-placeholder-val="{{ true }}">
          <img src="{{ logo }}" alt="logo" style="height:13cqmin;max-width:55cqw;object-fit:contain;margin-bottom:0.8cqh;" />
        </sc-if>
        <div style="font-size:2.1cqmin;text-transform:uppercase;letter-spacing:0.42em;font-weight:600;color:{{ ink }};opacity:0.55;padding-left:0.42em;">{{ label }}</div>
        <div style="font-size:15cqmin;font-weight:200;font-variant-numeric:tabular-nums;line-height:0.95;color:{{ ink }};letter-spacing:0.01em;">{{ countdownText }}</div>
        <div style="font-size:2.7cqmin;font-weight:400;color:{{ ink }};opacity:0.65;max-width:70cqw;">{{ title }}</div>
      </div>
    </sc-if>

    <sc-if value="{{ showAmbient }}" hint-placeholder-val="{{ false }}">
      <div style="{{ glassAmbientStyle }}">
        <sc-if value="{{ showLogoImg }}" hint-placeholder-val="{{ true }}">
          <img src="{{ logo }}" alt="logo" style="height:11cqmin;max-width:50cqw;object-fit:contain;margin-bottom:0.8cqh;" />
        </sc-if>
        <div style="font-size:6.4cqmin;font-weight:300;color:{{ ink }};animation:stPulse 3.4s ease-in-out infinite;letter-spacing:0.005em;">{{ subtitle }}</div>
        <div style="font-size:2.6cqmin;font-weight:400;color:{{ ink }};opacity:0.5;">{{ title }}</div>
      </div>
    </sc-if>

    <sc-if value="{{ showLogoOnly }}" hint-placeholder-val="{{ false }}">
      <div style="{{ glassLogoOnlyStyle }}">
        <img src="{{ logo }}" alt="logo" style="height:17cqmin;max-width:58cqw;object-fit:contain;" />
      </div>
    </sc-if>

  </div>

  <sc-if value="{{ showNowPlaying }}" hint-placeholder-val="{{ false }}">
    <div ref="{{ setNPBar }}" style="{{ actualNPStyle }}">
      <div style="width:6.2cqmin;height:6.2cqmin;border-radius:1.6cqmin;background:{{ track.cover }};flex:none;box-shadow:0 1cqmin 2cqmin rgba(0,0,0,0.12);"></div>
      <div style="display:flex;flex-direction:column;gap:0.5cqh;min-width:0;text-align:left;">
        <div style="font-size:2.3cqmin;font-weight:600;color:{{ ink }};white-space:nowrap;">{{ track.title }}</div>
        <div style="font-size:2cqmin;color:{{ ink }};opacity:0.5;white-space:nowrap;">{{ track.artist }}</div>
      </div>
      <div style="display:flex;align-items:flex-end;gap:0.6cqmin;height:4cqmin;margin-left:1.2cqmin;">
        <div style="width:0.8cqmin;height:100%;background:{{ accent }};border-radius:1cqmin;transform-origin:bottom;animation:stEq 0.9s ease-in-out infinite;animation-play-state:{{ eqPlay }};"></div>
        <div style="width:0.8cqmin;height:100%;background:{{ accent }};border-radius:1cqmin;transform-origin:bottom;animation:stEq 0.9s ease-in-out 0.25s infinite;animation-play-state:{{ eqPlay }};"></div>
        <div style="width:0.8cqmin;height:100%;background:{{ accent }};border-radius:1cqmin;transform-origin:bottom;animation:stEq 0.9s ease-in-out 0.5s infinite;animation-play-state:{{ eqPlay }};"></div>
        <div style="width:0.8cqmin;height:100%;background:{{ accent }};border-radius:1cqmin;transform-origin:bottom;animation:stEq 0.9s ease-in-out 0.15s infinite;animation-play-state:{{ eqPlay }};"></div>
      </div>
    </div>
  </sc-if>



  <sc-if value="{{ showExitHint }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;top:5cqh;left:50%;transform:translateX(-50%);font-size:1.9cqmin;letter-spacing:0.16em;text-transform:uppercase;font-weight:500;color:{{ ink }};opacity:0;animation:stHint 6.5s ease-in-out 1.2s both;">Press Esc to exit</div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:960,&quot;height&quot;:540},&quot;bg&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#fbfbfd&quot;},&quot;accent&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;rgb(10,132,255)&quot;},&quot;ink&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#1d1d1f&quot;},&quot;blobs&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[]},&quot;logo&quot;:{&quot;editor&quot;:null,&quot;default&quot;:null},&quot;hasLogo&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Team All-Hands&quot;},&quot;subtitle&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;We’ll begin shortly&quot;},&quot;countdownText&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;05:00&quot;},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Begins in&quot;},&quot;showCountdown&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true},&quot;showAmbient&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false},&quot;track&quot;:{&quot;editor&quot;:null,&quot;default&quot;:{&quot;cover&quot;:&quot;linear-gradient(135deg,#a8edea,#fed6e3)&quot;,&quot;title&quot;:&quot;Weightless&quot;,&quot;artist&quot;:&quot;Marconi Union&quot;}},&quot;showNowPlaying&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true},&quot;showMusicIcon&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true},&quot;eqPlay&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;running&quot;},&quot;showExitHint&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false},&quot;shader&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;},&quot;shaderCols&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;},&quot;glassOpacity&quot;:{&quot;editor&quot;:null,&quot;default&quot;:0.65}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props || {};
    const on = !!p.shader && p.shader !== 'iridescent';
    const iridOn = p.shader === 'iridescent';

    // Liquid Glass
    const rawG = (p.glassOpacity !== undefined && p.glassOpacity !== null) ? Number(p.glassOpacity) : 0.65;
    const g = isNaN(rawG) ? 0.65 : Math.max(0, Math.min(1, rawG));
    const blur = Math.round(g * 28);
    const bgA = (g * 0.16).toFixed(3);
    const bdA = (g * 0.35).toFixed(3);
    const hlA = (g * 0.60).toFixed(3);
    const shA = (g * 0.14).toFixed(3);
    const glassBase = g > 0.01
      ? ';background:rgba(255,255,255,' + bgA + ');backdrop-filter:blur(' + blur + 'px) saturate(1.8);-webkit-backdrop-filter:blur(' + blur + 'px) saturate(1.8);border:1px solid rgba(255,255,255,' + bdA + ');box-shadow:0 4cqmin 18cqmin rgba(0,0,0,' + shA + '),inset 0 1px 0 rgba(255,255,255,' + hlA + ');'
      : '';
    const glassPadCD = g > 0.01 ? '3.5cqmin 8cqmin' : '0';
    const glassPadAM = g > 0.01 ? '3cqmin 7cqmin' : '0';
    const glassR = g > 0.01 ? ';border-radius:3.5cqmin' : '';
    const glassCountdownStyle = 'display:flex;flex-direction:column;align-items:center;gap:2.4cqh;animation:stRise 1.2s cubic-bezier(.2,.7,.2,1) both;padding:' + glassPadCD + glassR + glassBase;
    const glassAmbientStyle = 'display:flex;flex-direction:column;align-items:center;gap:2cqh;padding:' + glassPadAM + glassR + glassBase;
    const glassLogoOnlyStyle = 'display:flex;align-items:center;justify-content:center;padding:' + glassPadCD + glassR + glassBase + ';animation:stRise 1.1s cubic-bezier(.2,.7,.2,1) both;';

    const npBgA = (0.5 + g * 0.15).toFixed(3);
    const npBlur = 20 + Math.round(g * 8);
    const npBdA = (0.08 + g * 0.22).toFixed(3);
    const npHlA = (0.35 + g * 0.25).toFixed(3);
    const npShA = (0.06 + g * 0.08).toFixed(3);
    const glassNPStyle = 'position:absolute;left:50%;bottom:6cqh;transform:translateX(-50%);display:flex;align-items:center;gap:2.2cqmin;padding:1.5cqmin 3cqmin 1.5cqmin 1.5cqmin;background:rgba(255,255,255,' + npBgA + ');backdrop-filter:blur(' + npBlur + 'px) saturate(1.8);-webkit-backdrop-filter:blur(' + npBlur + 'px) saturate(1.8);border:1px solid rgba(255,255,255,' + npBdA + ');border-radius:999px;box-shadow:0 2cqmin 6cqmin rgba(0,0,0,' + npShA + '),inset 0 1px 0 rgba(255,255,255,' + npHlA + ');animation:stRise 1s cubic-bezier(.2,.7,.2,1) both;';

    // Float vs pinned NP bar (showMusicIcon prop drives float mode)
    const npFloat = !!(p.showMusicIcon);
    const glassNPFloatStyle = 'position:absolute;left:0;top:0;display:flex;align-items:center;gap:2.2cqmin;padding:1.5cqmin 3cqmin 1.5cqmin 1.5cqmin;background:rgba(255,255,255,' + npBgA + ');backdrop-filter:blur(' + npBlur + 'px) saturate(1.8);-webkit-backdrop-filter:blur(' + npBlur + 'px) saturate(1.8);border:1px solid rgba(255,255,255,' + npBdA + ');border-radius:999px;box-shadow:0 2cqmin 6cqmin rgba(0,0,0,' + npShA + '),inset 0 1px 0 rgba(255,255,255,' + npHlA + ');will-change:left,top;z-index:5;pointer-events:none;';
    const actualNPStyle = npFloat ? glassNPFloatStyle : glassNPStyle;

    return {
      setCanvas: this.setCanvas, shaderDisplay: on ? 'block' : 'none', iridOn, blobOverlay: !on && !iridOn,
      showLogoImg: !!(p.hasLogo || p.logo) && !iridOn,
      showLogoOnly: !!(p.hasLogo || p.logo) && !iridOn && !p.showCountdown && !p.showAmbient,
      setIridFrame: this.setIridFrame,
      setNPBar: this.setNPBar,
      // Liquid Glass
      glassCountdownStyle, glassAmbientStyle, glassLogoOnlyStyle, glassNPStyle, actualNPStyle,
    };
  }

  setCanvas = (el) => {
    if (el === this._canvas) return;
    if (this._canvas) this.teardownGL();
    this._canvas = el || null;
    if (el && this.props && this.props.shader && this.props.shader !== 'iridescent') this.initGL();
  };

  setIridFrame = (el) => {
    this._iridFrame = el || null;
    if (el) {
      el.onload  = () => this._pushIridOpts();
      el.onerror = () => console.warn('[Stagelight] IridescentLogoAnimator iframe failed to load.');
    }
  };

  _pushIridOpts() {
    const f = this._iridFrame;
    if (!f || !f.contentWindow) return;
    const p = this.props || {};
    try {
      const opts = p.shaderOpts ? JSON.parse(p.shaderOpts) : {};
      f.contentWindow.postMessage({ type: 'irid', logo: p.logo || null, opts }, '*');
    } catch (e) {}
  };

  setNPBar = (el) => {
    if (el === this._npBar) return;
    if (this._npRaf != null) { cancelAnimationFrame(this._npRaf); this._npRaf = null; }
    this._npBar = el || null;
    if (!el || !(this.props && this.props.showMusicIcon)) return;
    this._startNPFloat(el);
  };

  _startNPFloat(el) {
    if (this._npRaf != null) { cancelAnimationFrame(this._npRaf); this._npRaf = null; }
    const par = el.parentNode;
    const pw = par ? par.clientWidth : 800;
    const ph = par ? par.clientHeight : 450;
    const spd = Math.min(pw, ph) * 0.0012;
    const ang = Math.random() * Math.PI * 2;
    this._npx = pw * 0.05 + Math.random() * pw * 0.6;
    this._npy = ph * 0.05 + Math.random() * ph * 0.6;
    this._nvx = Math.cos(ang) * spd;
    this._nvy = Math.sin(ang) * spd;
    el.style.left = this._npx + 'px';
    el.style.top = this._npy + 'px';
    const loop = () => {
      const bar = this._npBar;
      if (!bar) return;
      const p = bar.parentNode;
      const pw = p ? p.clientWidth : 800;
      const ph = p ? p.clientHeight : 450;
      const sw = bar.offsetWidth || Math.min(pw, ph) * 0.28;
      const sh = bar.offsetHeight || Math.min(pw, ph) * 0.07;
      this._npx += this._nvx;
      this._npy += this._nvy;
      if (this._npx <= 0) { this._npx = 0; this._nvx = Math.abs(this._nvx); }
      else if (this._npx + sw >= pw) { this._npx = pw - sw; this._nvx = -Math.abs(this._nvx); }
      if (this._npy <= 0) { this._npy = 0; this._nvy = Math.abs(this._nvy); }
      else if (this._npy + sh >= ph) { this._npy = ph - sh; this._nvy = -Math.abs(this._nvy); }
      bar.style.left = this._npx + 'px';
      bar.style.top = this._npy + 'px';
      this._npRaf = requestAnimationFrame(loop);
    };
    this._npRaf = requestAnimationFrame(loop);
  }

  componentDidUpdate() {
    const sh = this.props && this.props.shader;
    // Handle NP bar float/pin toggle change
    const npFloat = !!(this.props && this.props.showMusicIcon);
    if (this._npBar) {
      if (npFloat && this._npRaf == null) {
        this._startNPFloat(this._npBar);
      } else if (!npFloat && this._npRaf != null) {
        cancelAnimationFrame(this._npRaf);
        this._npRaf = null;
        this._npBar.style.left = '';
        this._npBar.style.top = '';
      }
    }
    if (sh === 'iridescent') { this._pushIridOpts(); return; }
    if (!sh || sh === '') { if (this._gl) this.teardownGL(); return; }
    if (this._canvas && sh !== this._shaderId) { this.teardownGL(); this.initGL(); return; }
    if (this._canvas && !this._gl) { this.initGL(); return; }
    if (this._gl) this.setTarget(this.props.shaderCols);
  }
  componentWillUnmount() {
    this.teardownGL();
    if (this._iridFrame) { this._iridFrame.onload = null; this._iridFrame = null; }
    if (this._npRaf != null) { cancelAnimationFrame(this._npRaf); this._npRaf = null; }
    this._npBar = null;
  }

  // Parse the shader colour string passed from the parent frame.
  // Format: "r,g,b|r,g,b|r,g,b|r,g,b" (four groups: base, A, B, C).
  // Each channel is 0–255 sRGB; output is linearised for the WebGL shader.
  // Missing groups default to black [0,0,0].
  parseCols(str) {
    const groups = String(str || '').split('|');
    const lin = (n) => Math.pow(Math.max(0, Math.min(255, +n || 0)) / 255, 2.2);
    const out = [];
    for (let i = 0; i < 4; i++) {
      const g = (groups[i] || '0,0,0').split(',');
      out.push([lin(g[0]), lin(g[1]), lin(g[2])]);
    }
    return out;
  }
  setTarget(str) { this._tgt = this.parseCols(str); }

  initGL() {
    const canvas = this._canvas;
    if (!canvas) return;
    this._cur = this.parseCols(this.props && this.props.shaderCols);
    this._tgt = this._cur.map((c) => c.slice());
    let gl = null;
    try {
      const o = { antialias: false, alpha: false, depth: false, stencil: false, premultipliedAlpha: false, powerPreference: 'high-performance' };
      gl = canvas.getContext('webgl2', o) || canvas.getContext('webgl', o);
    } catch (e) { gl = null; }
    if (!gl) { this.fallback(); return; }
    this._gl = gl;

    const VERT = 'attribute vec2 aPos;varying vec2 vUv;void main(){vUv=aPos*0.5+0.5;gl_Position=vec4(aPos,0.0,1.0);}';
    this._shaderId = this.props && this.props.shader;
    const PRELUDE = [
      'precision highp float;varying vec2 vUv;',
      'uniform float uTime;uniform float uAspect;uniform int uOctaves;',
      'uniform vec3 uBase;uniform vec3 uA;uniform vec3 uB;uniform vec3 uC;',
      'vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}',
      'vec2 mod289(vec2 x){return x-floor(x*(1.0/289.0))*289.0;}',
      'vec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}',
      'float snoise(vec2 v){const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);',
      'vec2 i=floor(v+dot(v,C.yy));vec2 x0=v-i+dot(i,C.xx);',
      'vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);',
      'vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod289(i);',
      'vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));',
      'vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);m=m*m;m=m*m;',
      'vec3 x=2.0*fract(p*C.www)-1.0;vec3 h=abs(x)-0.5;vec3 ox=floor(x+0.5);vec3 a0=x-ox;',
      'm*=1.79284291400159-0.85373472095314*(a0*a0+h*h);',
      'vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;return 130.0*dot(m,g);}',
      'float fbm(vec2 p){float v=0.0;float a=0.5;for(int i=0;i<3;i++){if(i>=uOctaves)break;v+=a*snoise(p);p*=2.02;a*=0.5;}return v;}',
      'vec3 RRTAndODTFit(vec3 v){vec3 a=v*(v+0.0245786)-0.000090537;vec3 b=v*(0.983729*v+0.4329510)+0.238081;return a/b;}',
      'vec3 aces(vec3 color){const mat3 mi=mat3(0.59719,0.07600,0.02840,0.35458,0.90834,0.13383,0.04823,0.01566,0.83777);',

    if (this._raf != null) { cancelAnimationFrame(this._raf); this._raf = null; }
    if (this._ro) { try { this._ro.disconnect(); } catch (e) {} this._ro = null; }
    if (this._resize) window.removeEventListener('resize', this._resize);
    if (this._onVis) document.removeEventListener('visibilitychange', this._onVis);
    const gl = this._gl;
    if (gl) { try { const ext = gl.getExtension('WEBGL_lose_context'); if (ext) ext.loseContext(); } catch (e) {} }
    this._gl = null; this._prog = null; this._u = null; this._shaderId = null;
    if (this._canvas) this._canvas.style.background = '';
  }
}

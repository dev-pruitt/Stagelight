  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink: silent during first-load/unpack and for opaque cross-origin
  // "Script error." noise; a genuine later error shows centered at the bottom for 60s.
  var __sinkArmed = false;
  setTimeout(function(){ __sinkArmed = true; }, 6000);
  window.addEventListener('error', function(e) {
    if (!__sinkArmed) return;
    var msg = String((e && (e.message || e.type)) || '').trim();
    if (!msg || (/^script error\.?$/i.test(msg) && !(e && e.filename))) return;
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:18px;left:50%;transform:translateX(-50%);max-width:80vw;font:12px/1.45 -apple-system,BlinkMacSystemFont,sans-serif;background:rgba(20,20,22,0.92);color:#ff8a80;padding:9px 15px;border-radius:10px;border:1px solid rgba(255,138,128,0.25);box-shadow:0 6px 20px rgba(0,0,0,0.28);z-index:99999;white-space:pre-wrap;max-height:30vh;overflow:auto;text-align:center';
    d.textContent = msg + (e && e.filename ? '  (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
    clearTimeout(window.__bundlerErrTimer);
    window.__bundlerErrTimer = setTimeout(function(){ if (d && d.parentNode) d.parentNode.removeChild(d); }, 60000);
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script>
  /* Stagelight — About (standalone shim baked into the deployed build).
     The .dc.html sources carry the fully-integrated version; this mirrors it on
     index.html until the next standalone re-export. It runs outside the bundled
     template, after the app mounts, and only appears on the setup screen. */
  (function () {
    var ACCENT = '#0a84ff';
    function showAbout() {
      if (document.getElementById('sl-about-modal')) return;
      var ov = document.createElement('div');
      ov.id = 'sl-about-modal';
      ov.style.cssText = 'position:fixed;inset:0;z-index:100000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.34);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);font-family:-apple-system,BlinkMacSystemFont,sans-serif;';
      ov.addEventListener('click', function () { ov.remove(); });
      var card = document.createElement('div');
      card.style.cssText = 'position:relative;width:420px;max-width:calc(100vw - 48px);background:#fbfbfd;border:1px solid rgba(0,0,0,0.08);border-radius:18px;box-shadow:0 24px 70px rgba(0,0,0,0.32),0 2px 8px rgba(0,0,0,0.12);overflow:hidden;';
      card.addEventListener('click', function (e) { e.stopPropagation(); });
      card.innerHTML =
        '<div style="display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid rgba(0,0,0,0.06);background:rgba(255,255,255,0.6);">' +
          '<button data-sl-close title="Close" style="width:13px;height:13px;border-radius:50%;border:none;background:#ff5f57;cursor:pointer;padding:0;box-shadow:inset 0 0 0 0.5px rgba(0,0,0,0.12);"></button>' +
          '<div style="flex:1;text-align:center;font-size:12.5px;font-weight:600;color:#86868b;margin-right:13px;">About</div>' +
        '</div>' +
        '<div style="padding:30px 32px 28px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px;">' +
          '<div style="width:66px;height:66px;border-radius:16px;background:' + ACCENT + ';display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 6px 18px rgba(0,0,0,0.16);margin-bottom:8px;">🎬</div>' +
          '<div style="font-size:22px;font-weight:700;letter-spacing:-0.02em;color:#1d1d1f;">Stagelight</div>' +
          '<div style="font-size:13.5px;color:#86868b;">Event Waiting Screen · Version 1.0.0</div>' +
          '<p style="margin:14px 0 0;font-size:13.5px;line-height:1.55;color:#3a3a3c;max-width:320px;">A self-contained “we’ll begin shortly” countdown screen for events, all-hands, webinars, and launches. Drop in a logo, the theme adapts to it, set a countdown, and optionally play full-length tracks through your own Spotify account — no backend required.</p>' +
          '<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:16px;">' +
            '<button data-sl-close style="border:none;border-radius:980px;padding:8px 20px;font-size:13px;font-weight:600;color:#fff;background:#0a84ff;cursor:pointer;box-shadow:0 4px 14px rgba(10,132,255,0.35);">Done</button>' +
          '</div>' +
          '<div style="margin-top:18px;font-size:11px;color:#a1a1a6;">MIT License · Built with the Design Components toolkit</div>' +
        '</div>';
      ov.appendChild(card);
      document.body.appendChild(ov);
      var closers = card.querySelectorAll('[data-sl-close]');
      for (var i = 0; i < closers.length; i++) closers[i].addEventListener('click', function () { ov.remove(); });
      function esc(e) { if (e.key === 'Escape') { ov.remove(); document.removeEventListener('keydown', esc); } }
      document.addEventListener('keydown', esc);
    }
    function makeBtn() {
      var b = document.createElement('button');
      b.id = 'sl-about-btn';
      b.title = 'About Stagelight';
      b.textContent = 'i';
      // Inline within the header row (a flex container), so it lines up at the
      // end of the "Event waiting screen" subtitle rather than floating over it.
      b.style.cssText = 'flex:none;align-items:center;justify-content:center;width:22px;height:22px;border:1px solid rgba(0,0,0,0.12);background:#fff;color:#0a84ff;border-radius:50%;font-size:14px;font-weight:600;cursor:pointer;line-height:1;padding:0;';
      b.addEventListener('click', showAbout);
      return b;
    }
    // Only show on the setup screen — the "Begin presentation" button marks it.
    function isSetup() {
      var bs = document.getElementsByTagName('button');
      for (var i = 0; i < bs.length; i++) { if ((bs[i].textContent || '').trim() === 'Begin presentation') return true; }
      return false;
    }
    // The header subtitle "Event waiting screen" — a leaf div we anchor after.
    function findSubtitle() {
      var ds = document.getElementsByTagName('div');
      for (var i = 0; i < ds.length; i++) {
        if (ds[i].children.length === 0 && (ds[i].textContent || '').trim() === 'Event waiting screen') return ds[i];
      }
      return null;
    }
    function tick() {
      if (!document.body) return;
      var b = document.getElementById('sl-about-btn');
      if (!b) b = makeBtn();
      var sub = findSubtitle();
      // Re-anchor after the subtitle (React re-renders may detach it).
      if (sub && sub.nextSibling !== b) sub.parentNode.insertBefore(b, sub.nextSibling);
      b.style.display = (sub && isSetup()) ? 'flex' : 'none';
    }
    setInterval(function () { try { tick(); } catch (e) {} }, 500);
  })();
  </script>

  <script>
  /* Stagelight — Volume control (standalone shim baked into the deployed build).
     The .dc.html sources carry the integrated version; this mirrors it on
     index.html until the next standalone re-export. It runs outside the bundled
     template, after the app mounts. Up/Down arrows change playback volume for
     uploaded/demo audio (HTMLMediaElement) and Spotify (Web Playback SDK), and
     flash an on-screen indicator. Keys are ignored while a text field is focused. */
  (function () {
    var STEP = 0.05;                 // 5% per keypress
    var KEY = 'stagelight_volume';
    var stored = parseFloat(localStorage.getItem(KEY));
    var volume = (isFinite(stored) && stored >= 0 && stored <= 1) ? stored : 1;
    var players = [];                // captured Spotify Web Playback SDK players

    // Capture Spotify players by wrapping the SDK constructor, so we can drive
    // their volume without reaching into the bundled app's component state.
    function hookSpotify() {
      if (!window.Spotify || !window.Spotify.Player || window.Spotify.Player.__slHooked) return;
      var Orig = window.Spotify.Player;
      function Wrapped(opts) {
        var inst = new Orig(opts);
        players.push(inst);
        try { inst.setVolume(volume); } catch (e) {}
        return inst;
      }
      Wrapped.prototype = Orig.prototype;
      Wrapped.__slHooked = true;
      try { window.Spotify.Player = Wrapped; } catch (e) {}
    }
    setInterval(hookSpotify, 300);
    hookSpotify();

    function applyToMedia() {
      var media = document.querySelectorAll('audio, video');
      for (var i = 0; i < media.length; i++) { try { media[i].volume = volume; } catch (e) {} }
    }
    function apply() {
      applyToMedia();
      for (var j = 0; j < players.length; j++) { try { players[j].setVolume(volume); } catch (e) {} }
      try { localStorage.setItem(KEY, String(volume)); } catch (e) {}
    }

    // Media elements created later (e.g. after "Begin") inherit the current level.
    function startObserver() {
      if (!document.body) { setTimeout(startObserver, 50); return; }
      new MutationObserver(applyToMedia).observe(document.body, { childList: true, subtree: true });
      applyToMedia();
    }
    startObserver();

    var hideTimer = null;
    function indicator() {
      var el = document.getElementById('sl-vol');
      if (!el) {
        el = document.createElement('div');
        el.id = 'sl-vol';
        el.style.cssText = 'position:fixed;left:50%;bottom:7%;transform:translateX(-50%) translateY(8px);z-index:100001;display:flex;align-items:center;gap:14px;padding:14px 22px;border-radius:18px;background:rgba(20,20,22,0.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 12px 40px rgba(0,0,0,0.4);font-family:-apple-system,BlinkMacSystemFont,sans-serif;opacity:0;transition:opacity .22s ease, transform .22s ease;pointer-events:none;';
        el.innerHTML =
          '<span id="sl-vol-icon" style="font-size:22px;line-height:1;width:26px;text-align:center;">🔊</span>' +
          '<div style="width:200px;height:8px;border-radius:4px;background:rgba(255,255,255,0.22);overflow:hidden;">' +
            '<div id="sl-vol-fill" style="height:100%;width:100%;border-radius:4px;background:#fff;transition:width .15s ease;"></div>' +
          '</div>' +
          '<span id="sl-vol-pct" style="min-width:42px;text-align:right;font-size:14px;font-weight:600;color:#fff;font-variant-numeric:tabular-nums;">100%</span>';
        (document.body || document.documentElement).appendChild(el);
      }
      var pct = Math.round(volume * 100);
      document.getElementById('sl-vol-fill').style.width = pct + '%';
      document.getElementById('sl-vol-pct').textContent = pct + '%';
      document.getElementById('sl-vol-icon').textContent = volume === 0 ? '🔇' : (volume <= 0.5 ? '🔉' : '🔊');
      el.style.opacity = '1';
      el.style.transform = 'translateX(-50%) translateY(0)';
      clearTimeout(hideTimer);
      hideTimer = setTimeout(function () {
        el.style.opacity = '0';
        el.style.transform = 'translateX(-50%) translateY(8px)';
      }, 1600);
    }

    function isTyping(t) {
      if (!t) return false;
      var tag = (t.tagName || '').toLowerCase();
      return tag === 'input' || tag === 'textarea' || tag === 'select' || t.isContentEditable;
    }
    function nudge(dir) {
      volume = Math.max(0, Math.min(1, Math.round((volume + dir * STEP) * 100) / 100));
      apply();
      indicator();
    }
    window.addEventListener('keydown', function (e) {
      if (e.defaultPrevented || e.metaKey || e.ctrlKey || e.altKey) return;
      if (isTyping(e.target)) return;
      if (e.key === 'ArrowUp') { nudge(1); e.preventDefault(); }
      else if (e.key === 'ArrowDown') { nudge(-1); e.preventDefault(); }
    }, true);
  })();
  </script>

le=\"display:flex;align-items:center;gap:10px;\">\n        <button onclick=\"{{ toggleFs }}\" title=\"Enter full screen when you begin\" style=\"display:flex;align-items:center;gap:6px;border:1px solid {{ fsBorder }};background:{{ fsBg }};color:{{ fsColor }};border-radius:980px;padding:9px 15px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s ease;\">⛶ Full screen<\u002Fbutton>\n        <button onclick=\"{{ resetSetup }}\" style=\"border:1px solid rgba(0,0,0,0.12);background:#fff;border-radius:980px;padding:9px 16px;font-size:13px;font-weight:600;color:#1d1d1f;cursor:pointer;\" style-hover=\"background:#f0f0f3;\">Reset<\u002Fbutton>\n        <button onclick=\"{{ beginEvent }}\" style=\"display:flex;align-items:center;gap:8px;padding:10px 22px;border:none;border-radius:980px;background:#0a84ff;color:#fff;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(10,132,255,0.35);transition:transform .15s ease,filter .15s ease;\" style-hover=\"filter:brightness(1.05);transform:scale(1.02);\">Begin presentation<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;min-height:0;display:flex;\">\n\n      <!-- Controls -->\n      <div style=\"flex:none;width:400px;height:100%;overflow-y:auto;padding:28px 28px 60px;border-right:1px solid rgba(0,0,0,0.08);background:#fbfbfd;display:flex;flex-direction:column;gap:30px;\">\n\n        <!-- Logo -->\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <div style=\"font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#86868b;\">Logo<\u002Fdiv>\n          <label ondrop=\"{{ onDrop }}\" ondragover=\"{{ onDragOver }}\" style=\"position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;height:128px;border:1.5px dashed rgba(0,0,0,0.18);border-radius:16px;background:#fff;cursor:pointer;transition:border-color .15s ease,background .15s ease;\" style-hover=\"border-color:{{ accent }};background:#fafaff;\">\n            <sc-if value=\"{{ hasLogo }}\" hint-placeholder-val=\"{{ false }}\">\n              <img src=\"{{ logo }}\" alt=\"logo\" style=\"max-height:80px;max-width:80%;object-fit:contain;\">\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noLogo }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;color:#86868b;pointer-events:none;\">\n                <div style=\"width:34px;height:34px;border-radius:10px;background:#f0f0f3;display:flex;align-items:center;justify-content:center;font-size:18px;color:#a1a1a6;\">↑<\u002Fdiv>\n                <div style=\"font-size:13px;font-weight:500;color:#1d1d1f;\">Drop a transparent PNG<\u002Fdiv>\n                <div style=\"font-size:11.5px;\">or click to upload · theme adapts to it<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <input type=\"file\" accept=\"image/*\" onchange=\"{{ onLogoChange }}\" style=\"position:absolute;inset:0;opacity:0;cursor:pointer;\">\n          <\u002Flabel>\n          <sc-if value=\"{{ hasLogo }}\" hint-placeholder-val=\"{{ false }}\">\n            <button onclick=\"{{ clearLogo }}\" style=\"align-self:flex-start;border:none;background:none;color:#86868b;font-size:12.5px;cursor:pointer;padding:2px 0;\" style-hover=\"color:#1d1d1f;\">Remove logo<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- Colors -->\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n            <div style=\"font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#86868b;\">Colors<\u002Fdiv>\n            <button onclick=\"{{ resetColors }}\" style=\"border:1px solid rgba(0,0,0,0.12);background:#fff;border-radius:980px;padding:5px 12px;font-size:12px;font-weight:600;color:#1d1d1f;cursor:pointer;\" style-hover=\"backgroun
